<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SS14 Interactive Chemistry Wiki</title>
    <style>
        :root {
            --bg-main: #141419;
            --bg-card: #202025;
            --bg-card-hover: #26262e;
            --border-color: #2b2b33;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --accent-blue: #007acc;
            --accent-orange: #d97706;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .wrapper {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
        }

        #recipe-search {
            width: 100%;
            max-width: 500px;
            padding: 12px;
            margin: 15px 0;
            background: #1e1e24;
            border: 1px solid #444;
            color: #fff;
            border-radius: 6px;
            font-size: 16px;
        }

        #category-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tab-btn {
            background: #2a2a3a;
            color: #b0b0cc;
            border: 1px solid #44445c;
            padding: 10px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background: var(--accent-blue);
            color: #ffffff;
            border-color: #0098ff;
        }

        #recipe-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 16px;
        }

        .recipe-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-left: 4px solid #6b7280;
            border-radius: 6px;
            padding: 16px;
            position: relative;
        }

        .recipe-card h3 {
            margin-top: 0;
            margin-bottom: 12px;
            text-transform: capitalize;
            font-size: 18px;
        }

        .ingredient-list {
            padding-left: 18px;
            color: var(--text-secondary);
            margin: 8px 0;
        }

        .ingredient-item {
            margin-bottom: 4px;
            position: relative;
        }

        /* Hover Link Style */
        .has-recipe {
            color: #4dabf7;
            text-decoration: underline dashed 1px;
            cursor: help;
        }

        /* Tooltip Container Styling */
        .tooltip-box {
            position: absolute;
            background: #2d2d35;
            border: 1px solid #454550;
            border-radius: 6px;
            padding: 12px;
            width: 260px;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: none;
            color: var(--text-primary);
            pointer-events: none;
        }

        .tooltip-box h4 {
            margin: 0 0 6px 0;
            color: #fff;
            border-bottom: 1px solid #444;
            padding-bottom: 4px;
            text-transform: capitalize;
        }

        .tooltip-sub-list {
            margin: 4px 0;
            padding-left: 16px;
            font-size: 13px;
            color: #b0b0c5;
        }

        .nested-preview {
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px dashed #555;
            font-size: 12px;
            color: #ffd43b;
        }

        .recipe-notes {
            margin-top: 10px;
            padding: 6px;
            background: rgba(217, 119, 6, 0.1);
            border-left: 2px solid var(--accent-orange);
            color: #f59e0b;
            font-size: 13px;
            border-radius: 0 4px 4px 0;
        }

        .base-chem-msg {
            font-size: 13px; 
            color: #666; 
            margin: 5px 0;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <h1>Space Station 14 Chemical Recipes</h1>
            <input type="text" id="recipe-search" placeholder="Search chemicals or ingredients...">
            <div id="category-tabs"></div>
        </header>

        <main>
            <div id="recipe-grid"></div>
        </main>
    </div>

    <div id="global-tooltip" class="tooltip-box"></div>

    <script>
        // Flat master dictionary containing every element from your data sheet for recursive lookup loops
        const masterRegistry = {
            // MEDICINES

            // PYROTECHNICS

            "foaming agent": { ingredients: [{amount: 1, name: "lithium"}, {amount: 1, name: "water"}] },
            "phlogiston": { ingredients: [{amount: 1, name: "plasma"}, {amount: 1, name: "sulfur"}] },
            "thermite": { ingredients: [{amount: 1, name: "iron"}, {amount: 1, name: "oxygen"}, {amount: 1, name: "aluminum"}] },

            // TOXINS
            "amatoxin": { ingredients: [{amount: 1, name: "mold"}, {amount: 1, name: "plasma"}] },
            "cyanide": { ingredients: [{amount: 1, name: "carbon"}, {amount: 1, name: "nitrogen"}, {amount: 1, name: "hydrogen"}] },
            "lexorin": { ingredients: [{amount: 1, name: "plasma"}, {amount: 1, name: "hydrogen"}, {amount: 1, name: "chlorine"}] },
            "toxin": { ingredients: [{amount: 1, name: "plasma"}, {amount: 1, name: "carbon"}] },
            "unstable mutagen": { ingredients: [{amount: 1, name: "plasma"}, {amount: 1, name: "radium"}, {amount: 1, name: "chlorine"}] },

            // FOODS
            "sugar": { ingredients: [{amount: 1, name: "carbon"}, {amount: 1, name: "hydrogen"}, {amount: 1, name: "oxygen"}] },
            "table salt": { ingredients: [{amount: 1, name: "sodium"}, {amount: 1, name: "chlorine"}] },
            "cannabis butter": { ingredients: [{amount: 1, name: "butter"}, {amount: 2, name: "thc"}] },
            "chocolate bar": { ingredients: [{amount: 2, name: "cocoa powder"}, {amount: 1, name: "sugar"}, {amount: 1, name: "milk"}] },
            "sausage": { ingredients: [{amount: 3, name: "protein"}, {amount: 1, name: "table salt"}, {amount: 1, name: "black pepper"}] },

            // BOTANICAL
            "ammonia": { ingredients: [{amount: 1, name: "hydrogen"}, {amount: 1, name: "nitrogen"}] },
            "ez nutrient": { ingredients: [{amount: 1, name: "trash"}, {amount: 1, name: "water"}] },
            "robust harvest": { ingredients: [{amount: 1, name: "unstable mutagen"}, {amount: 1, name: "potassium"}] },
            "weed killer": { ingredients: [{amount: 1, name: "toxin"}, {amount: 1, name: "sulfuric acid"}] },

            // OTHER BASICS
            "space cleaner": { ingredients: [{amount: 1, name: "water"}, {amount: 1, name: "ammonia"}] }
        };

        // Navigation Categories mapping your exact file inputs completely
        const chemicalDatabase = {
            "Medicine": ["Aloxadone", "Ambuzol", "Ambuzol plus", "Ammoniated mercury", "Antihol", "Arithrazine", "Artiplates", "Atropine", "Barozine", "Bicaridine", "Bozaide", "Bruizine", "Calomel", "Cognizine", "Cryoxadone", "Cryptobiolin", "Dermaline", "Devirate", "Dexalin", "Dexalin plus", "Diephendyramine", "Diphenylmethylamine", "Doxarubixadone", "Dylovene", "Ebifin", "Epinephrine", "Ethyloxyephedrine", "ethylredoxrazine", "Formaldehyde", "Genecide", "Haloperidol", "Hercuri", "Herignis", "Heroin", "Holy water", "Hyronalin", "Ibuprofen", "Immurin", "Inaprovaline", "Insuzine", "Ipecac", "Kelatane", "Lacerinol", "Leporazine", "Lipozine", "Luzurium", "Mannitol", "Minersslavine", "Mitogen", "Monover", "Multiver", "Musiver", "Necrosol", "Oculine", "Omnizine", "Opporozidone", "Oxandrolone", "Oxycodone", "Pentenic acid", "Phalanximine", "Polypyrylium oligomers", "Potassium iodine", "Protibal", "Procenyl lazide", "Procenyl lazide sludge", "Psicodine", "Pulped banana peel", "Puncturase", "Pyrazine salicylic acid", "Saline", "Seraka extract", "Siderlac", "Sigynate", "Silver sulfadiazine", "Shlasherium", "Spaceacilin", "Stasizium", "Stellibinin", "Styptic crystal catalyst", "Styptic powder", "Synaptizine", "Synthcells", "Syriniver", "Tehifin", "Tramadol tranexamic acid", "Tricordrazine", "Ultravasculine", "Umbroxol", "Vitrium froth"],
            "Narcotics": ["Alien sedative", "Aranesp", "Bananadine", "Blind toxin", "Desixyephedrine", "Dimtrimethic neuraminxyl acid", "Ephedrine", "Fentanyl", "Happiness", "Hyperzine", "Impedrezene", "Morphine", "Mouse bites", "Mute toxin", "Nicotine", "Nitrosyl plasmide", "Noxturine", "Norepineephric acid", "Oleoresin capsaicin", "Pax", "Shadowling toxin", "Space mirage", "Tear gas", "THC"],
            "Pyrotechnics": ["Ammonium nitrate fuel oil", "Black powder", "Chlorine trifluoride", "Cyclonite", "Fluorosurfactant", "Foaming agent", "Hexamine", "Methanol", "Napalm", "Octogen", "Phlogiston", "Thermite", "Welding fuel"],
            "Toxins": ["Aluite", "Amatoxin", "Anacea", "Bingle juice", "Bungotoxin", "Buzzochloric bees", "Carpolin", "Carpotoxin", "Cat drugs", "Chloral hydrate", "Corgium", "Crapotoxin", "Cyanide", "Ferrochromic acid", "Fresium", "Gastrotoxin", "Heartbreaker toxin", "Histamine", "Honk", "Juice that makes you hew", "Juice that makees you weh", "Lead", "Lexorin", "Licoxide", "Liplocide", "Liquid entropy", "Mechantoxin", "Microplastics", "Mindbreaker toxin", "Mold", "Nevcotta powder", "Nitric acid", "Pendetide", "Polytrinic acid", "Profanol", "Razorium", "Romerol", "Sarin", "Sulfuric acid", "Tazinide", "Theobromine", "Tirizene", "Toxin", "Tranquility", "Trash", "Triclor", "Unholy water", "Unstable mutagen", "Vent crud", "Vestome"],
            "Foods": ["Allicin", "Astrotame", "Bbq sauce", "Black pepper", "Butter", "Capsaicin oil", "Cocoa powder", "Cold sauce", "Cooked egg", "Cornoil", "Cornmeal", "Flour", "Frost oil", "Horseradish sauce", "Hot sauce", "Ketchunaise", "Ketchup", "Laughin syrup", "Mayonnaise", "Mitotrophin", "Mustard", "Nutriment", "Oats", "Oil", "Olive oil", "Protein", "Pumpkin flesh", "Raw egg", "Rice", "Soy cause", "Sugar", "Syrup", "Table salt", "Tea powder", "Uncooked animal proteins", "Universal enzyme", "Vinaigrette", "Vinegar", "Vitamin", "Cannabis butter", "Chocolate bar", "Sausage"],
            "Botanical": ["Ammonia", "Ammonium nitrate", "Diethylamine", "Ez nutrient", "Left 4 zed", "Pest killer", "Plant b gone", "Potash", "Potassium sulfate", "Robust harvest", "Saltpeter", "Sedin", "Weed killer"],
            "Biological": ["Advanced mutation toxin", "Alien blood", "Anaerobic blood", "Black blood", "Blood", "blue blood", "Cellulose fibers", "Fat", "Felinid mutation toxin", "Gender fluid", "Green slime jelly", "Grey matter", "Human mutation toxin", "Ichor", "Insect blood", "Rororium", "Sap", "Slime", "Slime boost", "Slime chilling helly", "Slime destabilizer", "Slime docility extract", "Slime stabilizer", "Slime steroid", "Slime toxin", "Vomit", "Zombie blood"],
            "Special": ["Carpetium", "Copium", "Laughter", "Nostalgia", "Tilenol"],
            "Other": ["Acetic anhydride", "Acetone", "Artifact glue", "Artifexium", "Ash", "Benzene", "Bleash", "Bz", "Carbon dioxide", "Charcoal", "Cream", "Cryostylane", "Eldritch essence", "Ethenone", "Fersilicite", "Fiber", "Frezon", "Goats milk", "Ground bee", "Healium", "Hydroxide", "Ice", "Methane", "Milk", "Mugwort tea", "Nitrium", "Nitrogen", "Nitrous oxide", "Nothing", "Oat milk", "Oxygen", "Phenol", "Plasma", "Saxoite", "Soap", "Sodium bicarbonate", "Sodium carbonate", "Sodium hydroxide", "Sodium polyacrylate", "Soy milk", "Space cleaner", "Space glue", "Space lube", "Spoil milk", "Thick smoke", "Tritium"]
        };

        let currentCategory = 'Medicine';
        let searchQuery = '';

        function initRecipeWebsite() {
            renderTabs();
            renderRecipes();
            setupSearch();
            setupTooltipEngine();
        }

        function renderTabs() {
            const tabContainer = document.getElementById('category-tabs');
            if (!tabContainer) return;
            tabContainer.innerHTML = '';
            
            Object.keys(chemicalDatabase).forEach(category => {
                const button = document.createElement('button');
                button.textContent = category;
                button.className = `tab-btn ${category === currentCategory ? 'active' : ''}`;
                button.addEventListener('click', () => {
                    currentCategory = category;
                    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
                    button.classList.add('active');
                    renderRecipes();
                });
                tabContainer.appendChild(button);
            });
        }

        function setupSearch() {
            const searchInput = document.getElementById('recipe-search');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    searchQuery = e.target.value.toLowerCase().trim();
                    renderRecipes();
                });
            }
        }

        function renderRecipes() {
            const displayGrid = document.getElementById('recipe-grid');
            if (!displayGrid) return;
            displayGrid.innerHTML = '';

            const activeList = chemicalDatabase[currentCategory] || [];
            
            activeList.forEach(chemName => {
                const lowerName = chemName.toLowerCase();
                const matchedConfig = masterRegistry[lowerName];

                // Filter mechanics
                const matchesName = chemName.toLowerCase().includes(searchQuery);
                let matchesIngredients = false;
                if (matchedConfig && matchedConfig.ingredients) {
                    matchesIngredients = matchedConfig.ingredients.some(ing => ing.name.toLowerCase().includes(searchQuery));
                }

                if (searchQuery && !matchesName && !matchesIngredients) return;

                const card = document.createElement('div');
                card.className = 'recipe-card';
                
                let cardHTML = `<h3>${chemName}</h3>`;

                if (matchedConfig && matchedConfig.ingredients) {
                    cardHTML += `<ul class="ingredient-list">`;
                    matchedConfig.ingredients.forEach(ing => {
                        const ingLower = ing.name.toLowerCase();
                        const trackingClass = masterRegistry[ingLower] ? 'class="has-recipe"' : '';
                        cardHTML += `<li class="ingredient-item"><span ${trackingClass} data-chem="${ingLower}"><strong>${ing.amount}u</strong> ${ing.name}</span></li>`;
                    });
                    cardHTML += `</ul>`;
                    if (matchedConfig.note) {
                        cardHTML += `<div class="recipe-notes">${matchedConfig.note}</div>`;
                    }
                } else {
                    cardHTML += `<div class="base-chem-msg">Base ingredient or unmapped recipe</div>`;
                }

                card.innerHTML = cardHTML;
                displayGrid.appendChild(card);
            });
        }

        // Deep Tooltip Rendering Engine
        function setupTooltipEngine() {
            const tooltip = document.getElementById('global-tooltip');

            document.body.addEventListener('mouseover', (e) => {
                const target = e.target.closest('.has-recipe');
                if (!target) return;

                const targetChem = target.getAttribute('data-chem');
                const data = masterRegistry[targetChem];
                if (!data) return;

                // Build top tier item layout
                let tooltipHTML = `<h4>${targetChem}</h4>`;
                tooltipHTML += `<ul class="tooltip-sub-list">`;
                
                data.ingredients.forEach(ing => {
                    tooltipHTML += `<li><strong>${ing.amount}u</strong> ${ing.name}</li>`;
                });
                tooltipHTML += `</ul>`;

                // RECURSIVE LOOKUP: Look deep inside to see if ingredients have recipes of their own
                let subNestedHTML = '';
                data.ingredients.forEach(ing => {
                    const subChemName = ing.name.toLowerCase();
                    const subData = masterRegistry[subChemName];
                    if (subData) {
                        subNestedHTML += `<div class="nested-preview">➔ <strong>${subChemName}:</strong> `;
                        subNestedHTML += subData.ingredients.map(i => `${i.amount}u ${i.name}`).join(' + ');
                        subNestedHTML += `</div>`;
                    }
                });

                if (subNestedHTML) {
                    tooltipHTML += subNestedHTML;
                }

                tooltip.innerHTML = tooltipHTML;
                tooltip.style.display = 'block';
            });

            document.body.addEventListener('mousemove', (e) => {
                if (tooltip.style.display === 'block') {
                    // Position offsets to dynamic screen dimensions
                    const offsetX = 15;
                    const offsetY = 15;
                    
                    let targetX = e.pageX + offsetX;
                    let targetY = e.pageY + offsetY;

                    // Bound checks to avoid edge bleeding
                    if (targetX + 280 > window.innerWidth + window.scrollX) {
                        targetX = e.pageX - 290;
                    }

                    tooltip.style.left = targetX + 'px';
                    tooltip.style.top = targetY + 'px';
                }
            });

            document.body.addEventListener('mouseout', (e) => {
                if (e.target.closest('.has-recipe')) {
                    tooltip.style.display = 'none';
                }
            });
        }

        document.addEventListener('DOMContentLoaded', initRecipeWebsite);
    </script>
</body>
</html>
