<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SS14 Chemistry Guide</title>
    <style>
        :root {
            --bg-main: #141419;
            --bg-card: #202025;
            --bg-card-hover: #26262e;
            --border-color: #2b2b33;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
        }

        .wrapper {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
        }

        #recipe-search {
            width: 100%;
            max-width: 500px;
            padding: 12px;
            margin: 15px 0;
            background: #1e1e24;
            border: 1px solid #444;
            color: #fff;
            border-radius: 6px;
            font-size: 16px;
        }

        #category-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tab-btn {
            background: #2a2a3a;
            color: #b0b0cc;
            border: 1px solid #44445c;
            padding: 10px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background: #007acc;
            color: #ffffff;
            border-color: #0098ff;
        }

        #recipe-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 14px;
        }

        .recipe-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-left: 4px solid #6b7280;
            border-radius: 6px;
            padding: 16px;
        }

        .recipe-card h3 {
            margin-top: 0;
            text-transform: capitalize;
        }

        .ingredient-list {
            padding-left: 20px;
            color: var(--text-secondary);
        }

        .recipe-notes {
            margin-top: 10px;
            padding: 6px;
            background: rgba(217, 119, 6, 0.1);
            border-left: 2px solid #d97706;
            color: #f59e0b;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <h1>Space Station 14 Chemistry Recipes</h1>
            <input type="text" id="recipe-search" placeholder="Search chemicals or ingredients (e.g., 'plasma')...">
            <div id="category-tabs"></div>
        </header>

        <main>
            <div id="recipe-grid"></div>
        </main>
    </div>

    <script>
        const chemicalDatabase = {
            "Medicine": {
                "inaprovaline": { name: "Inaprovaline", ingredients: [{amount: 1, name: "oxygen"}, {amount: 1, name: "carbon"}, {amount: 1, name: "sugar"}], recipeText: "Stabilizes critical patients and acts as a baseline stabilizer." },
                "bicaridine": { name: "Bicaridine", ingredients: [{amount: 1, name: "carbon"}, {amount: 1, name: "oxygen"}, {amount: 1, name: "inaprovaline"}], recipeText: "Heals brute damage." },
                "kelotane": { name: "Kelotane", ingredients: [{amount: 1, name: "silicon"}, {amount: 1, name: "carbon"}, {amount: 1, name: "inaprovaline"}], recipeText: "Heals burn damage." },
                "dermaline": { name: "Dermaline", ingredients: [{amount: 1, name: "kelotane"}, {amount: 1, name: "oxygen"}, {amount: 1, name: "phosphorus"}], recipeText: "Advanced burn medicine. Highly effective." },
                "dylovene": { name: "Dylovene (Anti-Toxin)", ingredients: [{amount: 1, name: "silicon"}, {amount: 1, name: "nitrogen"}, {amount: 1, name: "potassium"}], recipeText: "Purges toxins from the body." },
                "tricordrazine": { name: "Tricordrazine", ingredients: [{amount: 1, name: "inaprovaline"}, {amount: 1, name: "dylovene"}], recipeText: "General purpose healing chemical." },
                "cryoxadone": { name: "Cryoxadone", ingredients: [{amount: 1, name: "stable plasma"}, {amount: 1, name: "oxygen"}, {amount: 1, name: "inaprovaline"}], recipeText: "Requires cold temps to work. Excellent for cryo pods." },
                "leporazine": { name: "Leporazine", ingredients: [{amount: 1, name: "silicon"}, {amount: 1, name: "plasma"}], recipeText: "Regulates body temperature." },
                "aloxadone": { name: "Aloxadone", ingredients: [{amount: 1, name: "cryoxadone"}, {amount: 1, name: "leporazine"}, {amount: 1, name: "aloe juice"}], recipeText: "Advanced cryo-healing agent." },
                "hyropatoline": { name: "Hyropatoline", ingredients: [{amount: 1, name: "radium"}, {amount: 1, name: "carbon"}, {amount: 1, name: "bicaridine"}], recipeText: "Heals brute and cellular damage slowly." },
                "synaptizine": { name: "Synaptizine", ingredients: [{amount: 1, name: "sugar"}, {amount: 1, name: "lithium"}, {amount: 1, name: "water"}], recipeText: "Purges mind-altering chemicals and knocks down stuns." }
            },
            "Narcotics": {
                "space drugs": { name: "Space Drugs", ingredients: [{amount: 1, name: "mercury"}, {amount: 1, name: "sugar"}, {amount: 1, name: "lithium"}], recipeText: "Causes intense hallucinations and loss of balance." },
                "ephedrine": { name: "Ephedrine", ingredients: [{amount: 1, name: "sugar"}, {amount: 1, name: "oil"}, {amount: 1, name: "hydrogen"}], recipeText: "Stamina and speed boost. High risk of addiction." },
                "omnizine": { name: "Omnizine", ingredients: [{amount: 1, name: "sugar"}, {amount: 1, name: "phosphorus"}, {amount: 1, name: "unstable mutagen"}], recipeText: "Slowly heals all damage types. Highly narcotic." },
                "methamphetamine": { name: "Methamphetamine", ingredients: [{amount: 1, name: "ephedrine"}, {amount: 1, name: "iodine"}, {amount: 1, name: "phosphorus"}], recipeText: "Massive speed boost, causes jitters and eventual cardiac collapse if abused." }
            },
            "Pyrotechnics": {
                "gunpowder": { name: "Gunpowder", ingredients: [{amount: 1, name: "sulfur"}, {amount: 1, name: "carbon"}, {amount: 1, name: "potassium"}], recipeText: "Highly combustible explosive powder." },
                "thermite": { name: "Thermite", ingredients: [{amount: 1, name: "iron"}, {amount: 1, name: "oxygen"}, {amount: 1, name: "aluminum"}], recipeText: "Burns through reinforced walls when ignited." },
                "flash powder": { name: "Flash Powder", ingredients: [{amount: 1, name: "aluminum"}, {amount: 1, name: "sulfur"}, {amount: 1, name: "potassium"}], recipeText: "Explodes with a blinding flash of light." },
                "smoke powder": { name: "Smoke Powder", ingredients: [{amount: 1, name: "potassium"}, {amount: 1, name: "sugar"}, {amount: 1, name: "phosphorus"}], recipeText: "Creates massive visibility-blocking cloud." },
                "phlogiston": { name: "Phlogiston", ingredients: [{amount: 1, name: "plasma"}, {amount: 1, name: "sulfur"}, {amount: 1, name: "stable plasma"}], recipeText: "Ignites instantly upon contact with open air." },
                "potassium water": { name: "Potassium-Water Reaction", ingredients: [{amount: 1, name: "potassium"}, {amount: 1, name: "water"}], recipeText: "Instant aggressive explosion. Handle with care." }
            },
            "Toxins": {
                "toxin": { name: "Basic Toxin", ingredients: [{amount: 1, name: "plasma"}, {amount: 1, name: "carbon"}], recipeText: "Deals standard toxin damage over time." },
                "unstable mutagen": { name: "Unstable Mutagen", ingredients: [{amount: 1, name: "plasma"}, {amount: 1, name: "radium"}, {amount: 1, name: "chlorine"}], recipeText: "Causes structural mutations. Used heavily in botany." },
                "fluorosulfuric acid": { name: "Fluorosulfuric Acid", ingredients: [{amount: 1, name: "sulfuric acid"}, {amount: 1, name: "fluorine"}, {amount: 1, name: "hydrogen"}], recipeText: "Highly corrosive. Melts structures and gear." },
                "lexorin": { name: "Lexorin", ingredients: [{amount: 1, name: "plasma"}, {amount: 1, name: "hydrogen"}, {amount: 1, name: "chlorine"}], recipeText: "Causes rapid suffocation and tissue damage." },
                "cyanide": { name: "Cyanide", ingredients: [{amount: 1, name: "carbon"}, {amount: 1, name: "nitrogen"}, {amount: 1, name: "hydrogen"}], recipeText: "Lethal toxin that halts oxygen processing in the bloodstream." },
                "amatoxin": { name: "Amatoxin", ingredients: [{amount: 1, name: "mycelium extract"}, {amount: 1, name: "plasma"}], recipeText: "Severe fungal toxin that targets internal organs." }
            },
            "Foods": {
                "chocolate bar": { name: "Chocolate Bar", ingredients: [{amount: 2, name: "cocoa powder"}, {amount: 1, name: "sugar"}, {amount: 1, name: "milk"}], recipeText: "Sweet treat that restores nutrition." },
                "sausage": { name: "Sausage", ingredients: [{amount: 3, name: "meat chunks"}, {amount: 1, name: "salt"}, {amount: 1, name: "black pepper"}], recipeText: "Savory meal component." },
                "sugar": { name: "Sugar", ingredients: [{amount: 1, name: "carbon"}, {amount: 1, name: "hydrogen"}, {amount: 1, name: "oxygen"}], recipeText: "Basic sweetener and foundational cooking agent." },
                "cannabis butter": { name: "Cannabis Butter", ingredients: [{amount: 1, name: "butter"}, {amount: 2, name: "thc"}], recipeText: "Used for cooking space edibles." },
                "caramel": { name: "Caramel", ingredients: [{amount: 2, name: "sugar"}, {amount: 1, name: "water"}], recipeText: "Sweet candy coating." }
            },
            "Botanical/Biological": {
                "ez nutrient": { name: "EZ Nutrient", ingredients: [{amount: 1, name: "leftovers"}, {amount: 1, name: "water"}], recipeText: "Basic plant fertilizer." },
                "robust harvest": { name: "Robust Harvest", ingredients: [{amount: 1, name: "unstable mutagen"}, {amount: 1, name: "potassium"}], recipeText: "Prevents mutations but doubles crop yield." },
                "leftovers": { name: "Leftovers", ingredients: [{amount: 1, name: "biomass"}, {amount: 1, name: "water"}], recipeText: "Organic breakdown residue used as base compost." },
                "pest spray": { name: "Pest Spray", ingredients: [{amount: 1, name: "chlorine"}, {amount: 1, name: "toxin"}], recipeText: "Kills plant pests rapidly." },
                "weed killer": { name: "Weed Killer", ingredients: [{amount: 1, name: "toxin"}, {amount: 1, name: "acid"}], recipeText: "Clears unwanted invasive weeds from hydro trays." }
            },
            "Special": {
                "plastic polymers": { name: "Plastic Polymers", ingredients: [{amount: 1, name: "oil"}, {amount: 1, name: "plasticizer"}], recipeText: "Used for manufacturing utility components." },
                "space cleaner": { name: "Space Cleaner", ingredients: [{amount: 1, name: "water"}, {amount: 1, name: "ammonia"}], recipeText: "Cleans stains and slipping hazards instantly." },
                "structural foam": { name: "Structural Foam", ingredients: [{amount: 1, name: "iron"}, {amount: 1, name: "acid"}, {amount: 1, name: "organic polymers"}], recipeText: "Rapidly patches atmospheric breaches." },
                "foaming agent": { name: "Foaming Agent", ingredients: [{amount: 1, name: "lithium"}, {amount: 1, name: "water"}], recipeText: "Causes reactions to expand into physical foam clouds." }
            },
            "Other": {
                "salt": { name: "Salt", ingredients: [{amount: 1, name: "sodium"}, {amount: 1, name: "chlorine"}], recipeText: "Basic reagent used in various reactions." },
                "ethanol": { name: "Ethanol", ingredients: [{amount: 1, name: "water"}, {amount: 1, name: "carbon"}], recipeText: "Pure alcohol. Used as a reagent or drink component." },
                "sulfuric acid": { name: "Sulfuric Acid", ingredients: [{amount: 1, name: "sulfur"}, {amount: 1, name: "hydrogen"}, {amount: 1, name: "oxygen"}], recipeText: "Aggressive base chemical required for complex syntheses." },
                "ammonia": { name: "Ammonia", ingredients: [{amount: 1, name: "hydrogen"}, {amount: 1, name: "nitrogen"}], recipeText: "Pungent base gas agent." }
            }
        };

        let currentCategory = 'Medicine';
        let searchQuery = '';

        function initRecipeWebsite() {
            renderTabs();
            renderRecipes();
            setupSearch();
        }

        function renderTabs() {
            const tabContainer = document.getElementById('category-tabs');
            if (!tabContainer) return;
            tabContainer.innerHTML = '';
            
            Object.keys(chemicalDatabase).forEach(category => {
                const button = document.createElement('button');
                button.textContent = category;
                button.className = `tab-btn ${category === currentCategory ? 'active' : ''}`;
                button.addEventListener('click', () => {
                    currentCategory = category;
                    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
                    button.classList.add('active');
                    renderRecipes();
                });
                tabContainer.appendChild(button);
            });
        }

        function setupSearch() {
            const searchInput = document.getElementById('recipe-search');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    searchQuery = e.target.value.toLowerCase().trim();
                    renderRecipes();
                });
            }
        }

        function renderRecipes() {
            const displayGrid = document.getElementById('recipe-grid');
            if (!displayGrid) return;
            displayGrid.innerHTML = '';

            const activeCategoryData = chemicalDatabase[currentCategory] || {};
            
            Object.keys(activeCategoryData).forEach(key => {
                const item = activeCategoryData[key];
                const matchesName = item.name.toLowerCase().includes(searchQuery);
                const matchesIngredients = item.ingredients && item.ingredients.some(ing => ing.name.toLowerCase().includes(searchQuery));

                if (searchQuery && !matchesName && !matchesIngredients) return;

                const card = document.createElement('div');
                card.className = 'recipe-card';

                let cardHTML = `<h3>${item.name}</h3>`;
                if (item.ingredients) {
                    cardHTML += `<ul class="ingredient-list">`;
                    item.ingredients.forEach(ing => {
                        cardHTML += `<li><strong>${ing.amount}u</strong> ${ing.name}</li>`;
                    });
                    cardHTML += `</ul>`;
                }
                if (item.recipeText) {
                    cardHTML += `<div class="recipe-notes">${item.recipeText}</div>`;
                }

                card.innerHTML = cardHTML;
                displayGrid.appendChild(card);
            });
        }

        document.addEventListener('DOMContentLoaded', initRecipeWebsite);
    </script>
</body>
</html>
